<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ornikar jours de publication</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-2: #6b6b68;
    --text-3: #a0a09c;
    --bar-bg: #e8e8e5;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .header-icon {
    width: 36px; height: 36px;
    background: #1a5276;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .header-icon svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  h1 { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
  .subtitle { font-size: 12px; color: var(--text-3); margin-top: 1px; }

  /* LEGEND */
  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .legend-bar {
    height: 8px;
    flex: 1;
    border-radius: 4px;
    background: linear-gradient(to right, hsl(0,72%,43%), hsl(60,72%,43%), hsl(120,72%,43%));
  }
  .legend-label { font-size: 11px; color: var(--text-3); white-space: nowrap; }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 8px;
    padding-bottom: 14px;
  }

  .search-wrap {
    position: relative;
    flex: 1;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: var(--text-3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    height: 38px;
    padding: 0 12px 0 34px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: #1a5276; }
  input[type="text"]::placeholder { color: var(--text-3); }

  select {
    height: 38px;
    padding: 0 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  select:focus { border-color: #1a5276; }

  /* CONTENT */
  .content { padding: 12px 16px 32px; }

  .count {
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 15px;
    margin-bottom: 8px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .dept-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    background: #eef2f7;
    color: #4a6785;
    white-space: nowrap;
  }

  .center-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }

  .best-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    color: #fff;
    white-space: nowrap;
  }

  .day-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .day-label {
    font-size: 12px;
    width: 26px;
    flex-shrink: 0;
  }

  .bar-wrap {
    flex: 1;
    height: 7px;
    background: var(--bar-bg);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
  }

  .pct {
    font-size: 12px;
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* MORE */
  .more {
    text-align: center;
    font-size: 12px;
    color: var(--text-3);
    padding: 12px 0 4px;
  }

  .empty {
    text-align: center;
    font-size: 14px;
    color: var(--text-3);
    padding: 40px 0;
  }

  @media (min-width: 600px) {
    header { padding: 24px 32px 0; }
    .content { padding: 16px 32px 48px; }
    .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .cards-grid .card { margin-bottom: 0; }
  }

  @media (min-width: 1000px) {
    header { padding: 28px 48px 0; }
    .content { padding: 20px 48px 64px; }
    .controls { max-width: 700px; }
    .cards-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

const DEPTS = [...new Set(DATA.map(r => r[0]))].sort((a,b) => a-b);
let SD = null, Q = '', SB = 'dept';

const dfEl = document.getElementById('df');
dfEl.innerHTML = '<option value="">Tous les départements</option>' +
  DEPTS.map(d => `<option value="${d}">Dép. ${d}</option>`).join('');

function render() {
  let rows = DATA.filter(r => {
    if (SD !== null && r[0] !== SD) return false;
    if (Q) {
      const lo = Q.toLowerCase();
      return r[1].toLowerCase().includes(lo) || String(r[0]).includes(Q);
    }
    return true;
  });

  if (SB === 'name') rows.sort((a,b) => a[1].localeCompare(b[1]));
  else if (SB === 'best') rows.sort((a,b) => Math.max(...b.slice(2)) - Math.max(...a.slice(2)));
  else rows.sort((a,b) => a[0]-b[0] || a[1].localeCompare(b[1]));

  document.getElementById('cnt').textContent = `${rows.length} centre${rows.length > 1 ? 's' : ''}`;

  const L = document.getElementById('lst');
  L.innerHTML = '';

  let prevDept = null;

  rows.forEach(r => {
    const days = r.slice(2);
    const mx = Math.max(...days);
    const bestIdx = days.indexOf(mx);

    if (prevDept !== null && r[0] !== prevDept) {
      const sep = document.createElement('div');
      sep.style.cssText = 'grid-column:1/-1;display:flex;align-items:center;gap:10px;margin:6px 0 2px';
      sep.innerHTML = `<div style="flex:1;height:1px;background:#e0dedd"></div>
        <span style="font-size:11px;color:#b8b8b3;white-space:nowrap;letter-spacing:.5px;font-weight:500">Dép. ${r[0]}</span>
        <div style="flex:1;height:1px;background:#e0dedd"></div>`;
      L.appendChild(sep);
    }
    prevDept = r[0];

    const card = document.createElement('div');
    card.className = 'card';
    const bestColor = getColor(mx, mx);

    card.innerHTML = `
      <div class="card-header">
        <span class="dept-badge">Dép. ${r[0]}</span>
        <span class="center-name">${r[1]}</span>
        <span class="best-badge" style="background:${bestColor}">${DAYS[bestIdx]}&nbsp;${mx}%</span>
      </div>
      <div>
        ${DAYS.map((d, i) => {
          const v = days[i];
          const color = getColor(v, mx);
          const fw = v === mx ? 600 : 400;
          const tc = v === mx ? '#1a1a18' : '#6b6b68';
          return `<div class="day-row">
            <span class="day-label" style="font-weight:${fw};color:${tc}">${d}</span>
            <div class="bar-wrap">
              <div class="bar-fill" style="width:${v}%;background:${color || '#e8e8e5'}"></div>
            </div>
            <span class="pct" style="font-weight:${fw};color:${color || '#a0a09c'}">${v}%</span>
          </div>`;
        }).join('')}
      </div>`;

    L.appendChild(card);
  });

  if (!rows.length) {
    L.innerHTML = '<div class="empty">Aucun centre trouvé</div>';
  }
}

document.getElementById('q').addEventListener('input', e => { Q = e.target.value; render(); });
dfEl.addEventListener('change', e => { SD = e.target.value ? parseInt(e.target.value) || null : null; render(); });
document.getElementById('sf').addEventListener('change', e => { SB = e.target.value; render(); });

render();
</script>
